name: telegram_drive
description: Use Telegram as your private cloud drive.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.2.7

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # File operations
  file_picker: ^8.0.7
  path_provider: ^2.1.3
  path: ^1.9.0

  # Permissions
  permission_handler: ^11.3.1

  # Networking / HTTP
  http: ^1.2.1
  dio: ^5.4.3+1

  # Serialization
  json_annotation: ^4.9.0

  # UI / Media
  photo_view: ^0.15.0
  video_player: ^2.8.6
  chewie: ^1.8.1
  just_audio: ^0.9.39
  flutter_pdfview: ^1.3.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Typography
  google_fonts: ^6.2.1

  # Local DB / Cache
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3+1

  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1

  # Utility
  intl: ^0.19.0
  uuid: ^4.4.0
  mime: ^1.0.5
  share_plus: ^12.0.2
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
